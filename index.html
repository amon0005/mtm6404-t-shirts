<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T-Shirts</title>

  <style>
    @import url("https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap");

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Satoshi", Arial, sans-serif;
      margin: 0;
      padding: 30px;
      background: linear-gradient(135deg, #f8fafc, #dbeafe);
      color: #1f2937;
    }

    h1 {
      text-align: center;
      margin: 0 0 30px;
      font-size: 42px;
      color: #111827;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .store {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 32px rgba(15, 23, 42, 0.2);
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      background: #f1f5f9;
    }

    h3 {
      min-height: 45px;
      margin: 16px 0 8px;
      color: #0f172a;
    }

    p {
      margin: 8px 0;
    }

    select, button {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 15px;
    }

    select {
      width: 70px;
      border: 1px solid #cbd5e1;
      margin-right: 8px;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .out {
      display: inline-block;
      color: #b91c1c;
      background: #fee2e2;
      font-weight: bold;
      padding: 10px 12px;
      border-radius: 8px;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>

<h1>T-Shirts Store</h1>
<div id="root"></div>

<script>

const tshirts = [
  { title: "Blue T-Shirt", image: "images/blue-t-shirt.jpg", price: 7.99, stock: 4, quantity: 1 },
  { title: "Bright Purple T-Shirt", image: "images/bright-purple-t-shirt.jpg", price: 5.99, stock: 1, quantity: 1 },
  { title: "Cobalt Blue T-Shirt", image: "images/cobalt-blue-t-shirt.jpg", price: 9.99, stock: 5, quantity: 1 },
  { title: "Green T-Shirt", image: "images/green-t-shirt.jpg", price: 6.99, stock: 0, quantity: 1 },
  { title: "Grey T-Shirt", image: "images/grey-t-shirt.jpg", price: 4.99, stock: 2, quantity: 1 },
  { title: "Light Green T-Shirt", image: "images/light-green-t-shirt.jpg", price: 7.99, stock: 4, quantity: 1 },
  { title: "Purple T-Shirt", image: "images/purple-t-shirt.jpg", price: 7.99, stock: 0, quantity: 1 },
  { title: "Red T-Shirt", image: "images/red-t-shirt.jpg", price: 6.99, stock: 3, quantity: 1 },
  { title: "Teal T-Shirt", image: "images/teal-t-shirt.jpg", price: 7.99, stock: 2, quantity: 1 }
];

const { useState, useEffect } = React;

function imagePath(image) {
  return "images/" + image.split("/").pop();
}

function App() {

  const [shirts, setShirts] = useState(() => {
    const saved = localStorage.getItem("tshirts");
    const storedShirts = saved ? JSON.parse(saved) : tshirts;

    return storedShirts.map((shirt) => ({
      ...shirt,
      image: imagePath(shirt.image)
    }));
  });

  useEffect(() => {
    localStorage.setItem("tshirts", JSON.stringify(shirts));
  }, [shirts]);

  function changeQty(index, value) {
    const updated = shirts.map((s, i) =>
      i === index ? { ...s, quantity: Number(value) } : s
    );
    setShirts(updated);
  }

  function buy(index) {
    const updated = shirts.map((s, i) =>
      i === index
        ? {
            ...s,
            stock: s.stock - s.quantity,
            quantity: 1
          }
        : s
    );
    setShirts(updated);
  }

  return React.createElement(
    "div",
    { className: "store" },

    shirts.map((s, i) =>
      React.createElement(
        "div",
        { className: "card", key: i },

        React.createElement("img", { src: s.image, alt: s.title }),

        React.createElement("h3", null, s.title),
        React.createElement("p", null, "$" + s.price),
        React.createElement("p", null, "Stock: " + s.stock),

        s.stock > 0
          ? React.createElement(
              "div",
              null,

              React.createElement(
                "select",
                {
                  value: s.quantity,
                  onChange: (e) => changeQty(i, e.target.value)
                },

                Array.from({ length: s.stock }, (_, n) =>
                  React.createElement(
                    "option",
                    { value: n + 1, key: n },
                    n + 1
                  )
                )
              ),

              React.createElement(
                "button",
                { onClick: () => buy(i) },
                "Buy"
              )
            )
          : React.createElement("p", { className: "out" }, "Out of Stock")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root"))
  .render(React.createElement(App));

</script>

</body>
</html>
