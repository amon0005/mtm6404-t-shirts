<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T-Shirts</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 30px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .store {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    select, button {
      margin-top: 10px;
      padding: 6px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .out {
      color: red;
      font-weight: bold;
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>

<h1>T-Shirts Store</h1>
<div id="root"></div>

<script>

const tshirts = [
  { title: "Blue T-Shirt", image: "images/blue-t-shirt.jpg", price: 7.99, stock: 4, quantity: 1 },
  { title: "Bright Purple T-Shirt", image: "images/bright-purple-t-shirt.jpg", price: 5.99, stock: 1, quantity: 1 },
  { title: "Cobalt Blue T-Shirt", image: "images/cobalt-blue-t-shirt.jpg", price: 9.99, stock: 5, quantity: 1 },
  { title: "Green T-Shirt", image: "images/green-t-shirt.jpg", price: 6.99, stock: 0, quantity: 1 },
  { title: "Grey T-Shirt", image: "images/grey-t-shirt.jpg", price: 4.99, stock: 2, quantity: 1 },
  { title: "Light Green T-Shirt", image: "images/light-green-t-shirt.jpg", price: 7.99, stock: 4, quantity: 1 },
  { title: "Purple T-Shirt", image: "images/purple-t-shirt.jpg", price: 7.99, stock: 0, quantity: 1 },
  { title: "Red T-Shirt", image: "images/red-t-shirt.jpg", price: 6.99, stock: 3, quantity: 1 },
  { title: "Teal T-Shirt", image: "images/teal-t-shirt.jpg", price: 7.99, stock: 2, quantity: 1 }
];

const { useState, useEffect } = React;

function getImagePath(image) {
  return image.startsWith("images/") ? image : "images/" + image;
}

function normalizeShirtImages(shirts) {
  return shirts.map((shirt) => ({
    ...shirt,
    image: getImagePath(shirt.image)
  }));
}

function App() {

  const [shirts, setShirts] = useState(() => {
    const saved = localStorage.getItem("shirts");
    return saved ? normalizeShirtImages(JSON.parse(saved)) : tshirts;
  });

  useEffect(() => {
    localStorage.setItem("shirts", JSON.stringify(shirts));
  }, [shirts]);

  function changeQty(index, value) {
    const updated = shirts.map((s, i) =>
      i === index ? { ...s, quantity: Number(value) } : s
    );
    setShirts(updated);
  }

  function buy(index) {
    const updated = shirts.map((s, i) =>
      i === index
        ? {
            ...s,
            stock: s.stock - s.quantity,
            quantity: 1
          }
        : s
    );
    setShirts(updated);
  }

  return React.createElement(
    "div",
    { className: "store" },

    shirts.map((s, i) =>
      React.createElement(
        "div",
        { className: "card", key: i },

        React.createElement("img", { src: s.image }),

        React.createElement("h3", null, s.title),
        React.createElement("p", null, "$" + s.price),

        s.stock > 0
          ? React.createElement(
              "div",
              null,

              React.createElement("p", null, "Stock: " + s.stock),

              React.createElement(
                "select",
                {
                  value: s.quantity,
                  onChange: (e) => changeQty(i, e.target.value)
                },

                Array.from({ length: s.stock }, (_, n) =>
                  React.createElement(
                    "option",
                    { value: n + 1, key: n },
                    n + 1
                  )
                )
              ),

              React.createElement(
                "button",
                { onClick: () => buy(i) },
                "Buy"
              )
            )
          : React.createElement("p", { className: "out" }, "Out of Stock")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root"))
  .render(React.createElement(App));

</script>

</body>
</html>
